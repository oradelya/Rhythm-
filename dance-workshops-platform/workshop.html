<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Workshop Details | Rhythm</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
    <div class="logo">RHYTHM</div>

    <nav>
        <a href="index.html">Workshops</a>
        <a href="orders.html">My Bookings</a>
        <a href="login.html">Login</a>
    </nav>
</header>

<aside class="sidebar">
    <div class="profile">
        <div class="icon-box">★</div>
        <div>
            <h4 id="profileName">Guest</h4>
            <p id="profileRole">Not logged in</p>
        </div>
    </div>

    <a class="menu active" href="index.html">▦ Catalog</a>
    <a class="menu" href="orders.html">▣ My Bookings</a>
    <a class="menu" href="login.html">◇ Login</a>
</aside>

<main class="main">
    <section id="workshopDetails"></section>
</main>

<script>
function setupProfile() {
    const role = localStorage.getItem("role");
    const name = localStorage.getItem("name");

    const profileName = document.getElementById("profileName");
    const profileRole = document.getElementById("profileRole");

    if (role && name) {
        profileName.innerText = name;
        profileRole.innerText = role === "teacher" ? "Teacher Mode" : "User Mode";
    } else {
        profileName.innerText = "Guest";
        profileRole.innerText = "Not logged in";
    }
}

async function loadWorkshop() {
    const params = new URLSearchParams(window.location.search);
    const workshopId = params.get("id");

    const response = await fetch('https://rhythm-qp08.onrender.com/workshops');
    const workshops = await response.json();

    const workshop = workshops.find(w => w.id == workshopId);

    if (!workshop) {
        document.getElementById('workshopDetails').innerHTML = `
            <div class="card">
                <h2>Workshop not found</h2>
                <a href="index.html">
                    <button>Back to catalog</button>
                </a>
            </div>
        `;
        return;
    }

    const teacherName = workshop.teacher ? workshop.teacher.name : "Unknown";
    const teacherStyle = workshop.teacher ? workshop.teacher.style : "Dance instructor";
    const teacherExperience = workshop.teacher ? workshop.teacher.experience : "Experience not specified";

    document.getElementById('workshopDetails').innerHTML = `
        <div class="details-page">

            <div class="details-image">
                <img src="${workshop.image_url}" alt="${workshop.title}">
            </div>

            <div class="details-content">
                <span class="tag">${workshop.style}</span>

                <h1>${workshop.title}</h1>

                <p class="details-description">
                    ${workshop.description || "No description yet."}
                </p>

                <div class="details-info">
                    <p> <strong>Date:</strong> ${workshop.date || "Not specified"}</p>
                    <p> <strong>Time:</strong> ${workshop.time || "Not specified"}</p>
                    <p> <strong>Location:</strong> ${workshop.location || "Not specified"}</p>
                </div>

                <div class="teacher-box">
                    <h3>Instructor</h3>
                    <p><strong>${teacherName}</strong></p>
                    <p>Style: ${teacherStyle}</p>
                    <p>Experience: ${teacherExperience}</p>
                </div>

                <h2>${workshop.price} ₸</h2>

                <button onclick="bookWorkshop(${workshop.id})">
                    Book Now
                </button>

                <a href="index.html">
                    <button class="secondary-btn">Back to catalog</button>
                </a>
            </div>
        </div>
    `;
}

function bookWorkshop(workshopId) {
    localStorage.setItem("selected_workshop_id", workshopId);

    const role = localStorage.getItem("role");

    if (!role) {
        window.location.href = "login.html";
    } else {
        window.location.href = "orders.html";
    }
}

setupProfile();
loadWorkshop();
</script>

</body>
</html>
